<svg width="680" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  @keyframes dash { to { stroke-dashoffset: -16; } }
  @keyframes dashRev { to { stroke-dashoffset: 16; } }
  @keyframes pulse { 0%,100%{ opacity:0.2 } 50%{ opacity:0.6 } }
  @keyframes fadeCycle1 { 0%,15%{ opacity:1 } 30%,100%{ opacity:0.25 } }
  @keyframes fadeCycle2 { 0%,30%{ opacity:0.25 } 35%,50%{ opacity:1 } 55%,100%{ opacity:0.25 } }
  @keyframes fadeCycle3 { 0%,60%{ opacity:0.25 } 65%,80%{ opacity:1 } 85%,100%{ opacity:0.25 } }
  .flow-out { stroke-dasharray: 4 12; animation: dash 1.4s linear infinite; }
  .flow-back { stroke-dasharray: 4 12; animation: dashRev 1.4s linear infinite; }
  .sense1 { animation: fadeCycle1 4s ease-in-out infinite; }
  .sense2 { animation: fadeCycle2 4s ease-in-out infinite; }
  .sense3 { animation: fadeCycle3 4s ease-in-out infinite; }
  .ai-pulse { animation: pulse 3s ease-in-out infinite; }
  .loop-flow { stroke-dasharray: 5 5; animation: dashRev 2s linear infinite; }
</style>

<!-- Patient vignette -->
<rect x="20" y="30" width="125" height="140" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="66" y="42" width="32" height="6" rx="3" fill="#888" opacity="0.35"/>
<rect x="60" y="46" width="44" height="36" rx="4" fill="none" stroke="#888" stroke-width="0.8" opacity="0.35"/>
<line x1="68" y1="58" x2="96" y2="58" stroke="#888" stroke-width="0.8" opacity="0.3"/>
<line x1="68" y1="66" x2="90" y2="66" stroke="#888" stroke-width="0.8" opacity="0.3"/>
<line x1="68" y1="74" x2="94" y2="74" stroke="#888" stroke-width="0.8" opacity="0.3"/>
<text x="82" y="100" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#333">45M</text>
<text x="82" y="116" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#666">Chest pain</text>
<text x="82" y="132" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#666">Diaphoresis</text>
<text x="82" y="148" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#666">PMH: HTN, DM</text>
<text x="82" y="188" text-anchor="middle" font-size="12" fill="#888">Patient vignette</text>

<!-- AI agent -->
<rect x="20" y="218" width="125" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<!-- Chip icon with pulse -->
<rect x="38" y="234" width="20" height="20" rx="4" fill="#CECBF6" class="ai-pulse"/>
<rect x="38" y="234" width="20" height="20" rx="4" fill="none" stroke="#7F77DD" stroke-width="0.8"/>
<circle cx="48" cy="244" r="3" fill="none" stroke="#7F77DD" stroke-width="0.7"/>
<circle cx="48" cy="244" r="1" fill="#7F77DD"/>
<line x1="42" y1="232" x2="42" y2="228" stroke="#7F77DD" stroke-width="0.8" stroke-linecap="round"/>
<line x1="48" y1="232" x2="48" y2="228" stroke="#7F77DD" stroke-width="0.8" stroke-linecap="round"/>
<line x1="54" y1="232" x2="54" y2="228" stroke="#7F77DD" stroke-width="0.8" stroke-linecap="round"/>
<line x1="42" y1="256" x2="42" y2="260" stroke="#7F77DD" stroke-width="0.8" stroke-linecap="round"/>
<line x1="48" y1="256" x2="48" y2="260" stroke="#7F77DD" stroke-width="0.8" stroke-linecap="round"/>
<line x1="54" y1="256" x2="54" y2="260" stroke="#7F77DD" stroke-width="0.8" stroke-linecap="round"/>
<line x1="36" y1="239" x2="32" y2="239" stroke="#7F77DD" stroke-width="0.8" stroke-linecap="round"/>
<line x1="36" y1="249" x2="32" y2="249" stroke="#7F77DD" stroke-width="0.8" stroke-linecap="round"/>
<line x1="60" y1="239" x2="64" y2="239" stroke="#7F77DD" stroke-width="0.8" stroke-linecap="round"/>
<line x1="60" y1="249" x2="64" y2="249" stroke="#7F77DD" stroke-width="0.8" stroke-linecap="round"/>
<text x="98" y="246" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">AI agent</text>

<!-- Vignette to agent -->
<line x1="82" y1="192" x2="82" y2="216" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Agent to registry (animated flow out) -->
<path d="M145 240 L170 240 L170 185 L188 185" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" class="flow-out"/>

<!-- Feedback loop: registry back to agent (animated dashed purple) -->
<path d="M190 340 L170 340 L170 262 L147 262" fill="none" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow-purple)" class="loop-flow"/>

<!-- Sensing registry container -->
<rect x="190" y="20" width="272" height="338" rx="12" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="5 3"/>
<text x="326" y="44" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#333">Sensing registry</text>

<!-- History (cycles first) -->
<g class="sense1">
  <rect x="206" y="62" width="240" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <path d="M222 78 Q222 70 230 70 L242 70 Q250 70 250 78 L250 86 Q250 94 242 94 L236 94 L232 100 L232 94 L230 94 Q222 94 222 86 Z" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
  <text x="336" y="78" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">History</text>
  <text x="336" y="96" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Symptoms, onset, PMH</text>
</g>

<!-- Physical exam (cycles second) -->
<g class="sense2">
  <rect x="206" y="122" width="240" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <circle cx="234" cy="140" r="6" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
  <path d="M234 134 L234 130 Q234 126 238 126 L240 126" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
  <circle cx="242" cy="126" r="2" fill="#0F6E56" opacity="0.4"/>
  <text x="336" y="138" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Physical exam</text>
  <text x="336" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Vitals, auscultation</text>
</g>

<!-- Labs -->
<rect x="206" y="182" width="240" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="230" y="190" width="8" height="16" rx="2" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
<line x1="228" y1="190" x2="240" y2="190" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
<rect x="231" y="200" width="6" height="5" rx="1" fill="#0F6E56" opacity="0.25"/>
<text x="336" y="202" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Labs</text>

<!-- Imaging (cycles third) -->
<g class="sense3">
  <rect x="206" y="234" width="240" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="224" y="244" width="20" height="14" rx="2" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
  <line x1="234" y1="258" x2="234" y2="262" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
  <line x1="228" y1="262" x2="240" y2="262" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
  <polyline points="226,251 230,251 232,246 234,255 236,249 238,251 242,251" fill="none" stroke="#0F6E56" stroke-width="0.7" opacity="0.4"/>
  <text x="336" y="250" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Imaging</text>
  <text x="336" y="268" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">ECG, echo, CT</text>
</g>

<!-- Iterative sensing label -->
<text x="326" y="308" text-anchor="middle" font-size="12" fill="#555">↻ Iterative sensing</text>
<text x="326" y="326" text-anchor="middle" font-size="12" fill="#999">Query → receive → update belief → re-query</text>

<!-- Animated arrows to human sources -->
<line x1="446" y1="86" x2="490" y2="86" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" class="flow-out sense1"/>
<line x1="446" y1="146" x2="490" y2="146" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" class="flow-out sense2"/>
<line x1="446" y1="258" x2="490" y2="258" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" class="flow-out sense3"/>

<!-- Patient -->
<circle cx="515" cy="86" r="22" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<circle cx="515" cy="78" r="5" fill="none" stroke="#993C1D" stroke-width="1" opacity="0.6"/>
<path d="M505 98 Q505 90 515 88 Q525 90 525 98" fill="none" stroke="#993C1D" stroke-width="1" opacity="0.6"/>
<text x="515" y="120" text-anchor="middle" font-size="12" fill="#888">Patient</text>

<!-- Nurse -->
<circle cx="515" cy="146" r="22" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<circle cx="515" cy="138" r="5" fill="none" stroke="#185FA5" stroke-width="1" opacity="0.6"/>
<path d="M505 158 Q505 150 515 148 Q525 150 525 158" fill="none" stroke="#185FA5" stroke-width="1" opacity="0.6"/>
<line x1="523" y1="135" x2="523" y2="141" stroke="#185FA5" stroke-width="1" opacity="0.4"/>
<line x1="520" y1="138" x2="526" y2="138" stroke="#185FA5" stroke-width="1" opacity="0.4"/>
<text x="515" y="180" text-anchor="middle" font-size="12" fill="#888">Nurse</text>

<!-- Specialist -->
<circle cx="515" cy="258" r="22" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<circle cx="515" cy="250" r="5" fill="none" stroke="#854F0B" stroke-width="1" opacity="0.6"/>
<path d="M505 270 Q505 262 515 260 Q525 262 525 270" fill="none" stroke="#854F0B" stroke-width="1" opacity="0.6"/>
<path d="M523 247 L524.5 250 L528 250.5 L525.5 253 L526 256.5 L523 255 L520 256.5 L520.5 253 L518 250.5 L521.5 250 Z" fill="#854F0B" opacity="0.3"/>
<text x="515" y="292" text-anchor="middle" font-size="12" fill="#888">Specialist</text>

<!-- Animated finding returns -->
<line x1="537" y1="86" x2="570" y2="86" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" class="flow-back sense1"/>
<line x1="537" y1="146" x2="570" y2="146" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" class="flow-back sense2"/>
<line x1="537" y1="258" x2="570" y2="258" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" class="flow-back sense3"/>

<rect x="572" y="74" width="82" height="24" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="613" y="86" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">{finding}</text>
<rect x="572" y="134" width="82" height="24" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="613" y="146" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">{finding}</text>
<rect x="572" y="246" width="82" height="24" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="613" y="258" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">{finding}</text>

<!-- Agent to diagnosis -->
<path d="M82 274 L82 450 L510 450" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="290" y="440" text-anchor="middle" font-size="12" fill="#888">AI decides →</text>

<!-- Diagnosis -->
<rect x="512" y="424" width="150" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<path d="M530 446 L536 454 L548 440" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
<text x="594" y="442" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">Diagnosis</text>
<text x="594" y="460" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">Final decision</text>

</svg>