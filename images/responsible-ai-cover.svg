<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes pulse{0%,100%{opacity:var(--o1)}50%{opacity:var(--o2)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(var(--dy,-3px))}}
  @keyframes dash{to{stroke-dashoffset:-20}}
  @keyframes fadearc{0%,100%{opacity:var(--ao1)}50%{opacity:var(--ao2)}}
  @keyframes rock{0%,100%{transform:rotate(-1.8deg)}50%{transform:rotate(1.8deg)}}
  @keyframes glow{0%,100%{opacity:0.07}50%{opacity:0.14}}
  @keyframes dropin{0%{opacity:0;transform:translateY(-8px)}100%{opacity:var(--fo);transform:translateY(0)}}
  @keyframes sweep{0%{stroke-dashoffset:200}100%{stroke-dashoffset:0}}
  .pulse{animation:pulse var(--dur,3s) ease-in-out infinite;animation-delay:var(--del,0s)}
  .float{animation:float var(--dur,4s) ease-in-out infinite;animation-delay:var(--del,0s)}
  .dashanim{stroke-dasharray:5 5;animation:dash var(--dur,2s) linear infinite}
  .rock{transform-origin:340px 93px;animation:rock 6s ease-in-out infinite}
  .glow{animation:glow 4s ease-in-out infinite}
  .dropin{animation:dropin 0.8s ease-out both;animation-delay:var(--del,0s)}
  .sweep{stroke-dasharray:200;animation:sweep var(--dur,1.5s) ease-out both;animation-delay:var(--del,0s)}

  /* Light mode defaults */
  :root{--p:#2C2C2A;--s:#5F5E5A;--t:#888780;--bg2:#F1EFE8;--b:#D3D1C7}
  @media(prefers-color-scheme:dark){:root{--p:#D3D1C7;--s:#B4B2A9;--t:#888780;--bg2:#2C2C2A;--b:#5F5E5A}}
</style>

