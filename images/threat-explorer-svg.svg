<!-- Path C: Query → Multi-agent → Response → Table (coral) -->
<circle r="4" fill="#993C1D" opacity="0.8">
<animateMotion dur="1.2s" begin="4s;pC3.end+2s" fill="freeze" id="pC0"><mpath href="#p-q-multi"/></animateMotion>
