<!-- ===== ANIMATED FLOW DOTS ===== -->

<!-- Path A: Query → LLM Chain → Response → Bar chart (blue) -->
<circle r="4" fill="#185FA5" opacity="0.8">
<animateMotion dur="1.2s" begin="0s;pA3.end+2s" fill="freeze" id="pA0"><mpath href="#p-q-llm"/></animateMotion>
</circle>
<circle r="4" fill="#185FA5" opacity="0.8">
<animateMotion dur="1.2s" begin="pA0.end" fill="freeze" id="pA1"><mpath href="#p-llm-resp"/></animateMotion>
</circle>
<circle r="4" fill="#185FA5" opacity="0.8">
