<text class="ts" x="455" y="378" text-anchor="middle" dominant-baseline="central" fill="#888">40k rows · 25 cols</text>

<!-- Dashed tool call lines -->
<path d="M355,130 Q420,130 420,338" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M355,255 Q420,255 420,338" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
