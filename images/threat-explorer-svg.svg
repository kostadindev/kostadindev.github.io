<text class="ts" x="277" y="410" text-anchor="middle" dominant-baseline="central" fill="#993C1D">3 specialized agents</text>
<rect x="200" y="436" width="155" height="22" rx="4" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="tl" x="277" y="450" text-anchor="middle" dominant-baseline="central" fill="#888">70% valid · $0.57 · 2741s</text>

<!-- SQL Tool -->
<rect x="390" y="340" width="130" height="52" rx="8" fill="#F5F5F2" stroke="#999" stroke-width="0.5" stroke-dasharray="4 3"/>
