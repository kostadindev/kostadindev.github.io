<text class="th" x="85" y="267" text-anchor="middle" dominant-baseline="central" fill="#3C3489">language query</text>

<!-- Connectors: query → agents -->
<path id="p-q-llm" d="M150,240 Q172,240 172,130 Q172,110 200,110" fill="none" stroke="#999" stroke-width="0.5" marker-end="url(#arrow)"/>
<path id="p-q-react" d="M150,255 L200,255" fill="none" stroke="#999" stroke-width="0.5" marker-end="url(#arrow)"/>
<path id="p-q-multi" d="M150,270 Q172,270 172,390 Q172,400 200,400" fill="none" stroke="#999" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- S1: Agents -->
<rect x="200" y="78" width="155" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
