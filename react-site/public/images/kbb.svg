<style>
@media(prefers-reduced-motion:no-preference){
.pulse{animation:pulse 3s ease-in-out infinite}
.pulse2{animation:pulse 3s ease-in-out infinite .5s}
@keyframes pulse{0%,100%{opacity:.1}50%{opacity:.22}}
.glow{animation:glow 2.5s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.08}50%{opacity:.18}}
.particle{animation:flow var(--dur,3s) linear infinite;animation-delay:var(--delay,0s);offset-rotate:0deg}
@keyframes flow{0%{offset-distance:0%;opacity:0}10%{opacity:1}90%{opacity:1}100%{offset-distance:100%;opacity:0}}
.fan-particle{animation:fanflow var(--dur,2.5s) linear infinite;animation-delay:var(--delay,0s);offset-rotate:0deg}
@keyframes fanflow{0%{offset-distance:0%;opacity:0}15%{opacity:.7}85%{opacity:.7}100%{offset-distance:100%;opacity:0}}
.node-pop{animation:nodepop .6s ease-out both;animation-delay:var(--d,0s)}
@keyframes nodepop{0%{opacity:0;transform:scale(.85)}100%{opacity:1;transform:scale(1)}}
.merge-spin{animation:mspin 8s linear infinite;transform-origin:394px 210px}
@keyframes mspin{to{transform:rotate(360deg)}}
}
text{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif}
.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.ts{font-size:12px;font-weight:400;fill:#5F5E5A}
</style>
</defs>

